<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF 持股明細</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#07090f;--surface:#0d1117;--card:#111720;--border:#1c2636;--border2:#243044;
  --text:#e2eaf8;--muted:#4a6080;--sub:#8aaac8;
  --accent:#3b82f6;--accent2:#60a5fa;--gold:#f0a730;--green:#34d399;--red:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:24px 16px}
.wrap{max-width:940px;margin:0 auto}

/* Header */
.header{display:flex;align-items:center;gap:14px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border2)}
.logo{width:46px;height:46px;background:linear-gradient(135deg,#1a3a80,#2563eb);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;box-shadow:0 4px 20px rgba(37,99,235,.4)}
.header h1{font-size:20px;font-weight:900;letter-spacing:.03em}
.header p{font-size:12px;color:var(--sub);margin-top:3px}
.src-badge{font-size:11px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);color:var(--green);padding:2px 10px;border-radius:20px;display:inline-block;margin-top:4px}

/* Search */
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:150px;background:var(--card);border:1px solid var(--border2);color:var(--text);padding:12px 16px;border-radius:10px;font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;outline:none;transition:border-color .2s;letter-spacing:.05em}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--muted);font-weight:400;font-size:13px}
.btn{padding:12px 20px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:700;font-family:'Noto Sans TC',sans-serif;transition:all .2s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#1a4fc8,#3b82f6);color:#fff;box-shadow:0 4px 16px rgba(59,130,246,.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,.45)}
.btn-primary:disabled{background:#1a2740;color:var(--muted);box-shadow:none;transform:none;cursor:not-allowed}
.btn-export{background:linear-gradient(135deg,#14532d,#16a34a);color:#fff;box-shadow:0 4px 16px rgba(22,163,74,.3)}
.btn-export:hover{transform:translateY(-1px)}
.btn-export:disabled{background:#1a2740;color:var(--muted);box-shadow:none;transform:none;cursor:not-allowed}

/* Quick chips */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.chip-group{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-right:4px}
.chip{background:var(--card);border:1px solid var(--border2);color:var(--sub);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'IBM Plex Mono',monospace}
.chip:hover{background:var(--border2);color:var(--text);border-color:var(--accent)}

/* ETF info bar */
.etf-info{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;flex-wrap:wrap;gap:20px;align-items:center}
.etf-name{font-size:18px;font-weight:900}
.etf-sym{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent2);background:rgba(59,130,246,.12);padding:3px 10px;border-radius:6px;font-weight:700}
.meta-grid{display:flex;flex-wrap:wrap;gap:16px;margin-left:auto}
.meta-item{text-align:center}
.meta-item .lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.meta-item .val{font-size:15px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--text)}

/* Main grid */
.main-grid{display:grid;grid-template-columns:1fr 290px;gap:20px;align-items:start}
@media(max-width:680px){.main-grid{grid-template-columns:1fr}}

/* Table */
.table-card{background:var(--card);border:1px solid var(--border2);border-radius:14px;overflow:hidden}
.table-head-row{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.table-head-row h2{font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--sub);text-transform:uppercase}
table{width:100%;border-collapse:collapse}
thead th{padding:9px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;background:#0a1020;border-bottom:1px solid var(--border)}
thead th.r{text-align:right}
tbody tr{border-bottom:1px solid var(--border);transition:background .12s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(59,130,246,.04)}
tbody td{padding:12px 16px;font-size:14px}
tbody td.r{text-align:right;font-family:'IBM Plex Mono',monospace;font-weight:600}
.rank{width:28px;height:28px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.r1{background:rgba(240,167,48,.18);color:var(--gold)}
.r2{background:rgba(148,163,184,.13);color:#94a3b8}
.r3{background:rgba(180,120,60,.15);color:#b47c3c}
.rn{background:var(--border);color:var(--muted)}
.s-info{display:flex;flex-direction:column;gap:2px}
.s-code{font-size:13px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--accent2);letter-spacing:.04em}
.s-name{font-size:12px;color:var(--sub)}
.bar-wrap{display:flex;align-items:center;gap:8px}
.bar-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;min-width:50px}
.bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.pct{font-size:13px;font-weight:700;font-family:'IBM Plex Mono',monospace;min-width:52px;text-align:right}
.others-row td{color:var(--muted);font-size:13px;padding:10px 16px}
.total-row{background:#0a1020}
.total-row td{font-weight:700;padding:12px 16px;border-top:1px solid var(--border2);font-family:'IBM Plex Mono',monospace}

/* Chart card */
.chart-card{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:20px;position:sticky;top:20px}
.chart-card h2{font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--sub);text-transform:uppercase;margin-bottom:16px}
.chart-wrap{width:100%;aspect-ratio:1;position:relative;max-width:240px;margin:0 auto}
.chart-legend{margin-top:16px;display:flex;flex-direction:column;gap:6px}
.leg-item{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--sub)}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.leg-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.leg-pct{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--text);font-size:12px}
.total-row-card{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.total-row-card .lbl{font-size:12px;color:var(--muted)}
.total-row-card .val{font-size:18px;font-weight:900;font-family:'IBM Plex Mono',monospace;color:var(--accent2)}

/* States */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.5}
.empty p{font-size:14px;line-height:1.8;color:var(--sub)}
.loading{text-align:center;padding:60px 20px}
.spinner{width:34px;height:34px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);padding:14px 18px;border-radius:10px;font-size:14px;margin-bottom:16px;line-height:1.7}

/* Position donut labels */
.position-row{display:flex;gap:12px;margin-top:12px}
.pos-item{flex:1;text-align:center;background:var(--border);border-radius:8px;padding:8px 6px}
.pos-item .pl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.06em}
.pos-item .pv{font-size:14px;font-weight:700;font-family:'IBM Plex Mono',monospace;margin-top:3px}
</style>
</head>
<body>
<div class="wrap">

<div class="header">
  <div class="logo">📊</div>
  <div>
    <h1>ETF 持股明細</h1>
    <p>前十大成分股 · 持股占比分析</p>
    <span class="src-badge">✓ Yahoo Finance 公開資料・免 API Key</span>
  </div>
</div>

<div class="search-bar">
  <input id="inp" placeholder="輸入 ETF 代號，如 0050、00878、SPY、QQQ…" maxlength="12"
    onkeypress="if(event.key==='Enter') go()">
  <button class="btn btn-primary" id="searchBtn" onclick="go()">查詢</button>
  <button class="btn btn-export" id="exportBtn" onclick="exportExcel()" disabled>⬇ 匯出 Excel</button>
</div>

<div class="chips">
  <span class="chip-label">台股</span>
  <div class="chip-group">
    <span class="chip" onclick="q('0050')">0050</span>
    <span class="chip" onclick="q('0056')">0056</span>
    <span class="chip" onclick="q('00878')">00878</span>
    <span class="chip" onclick="q('00919')">00919</span>
    <span class="chip" onclick="q('00929')">00929</span>
    <span class="chip" onclick="q('00713')">00713</span>
    <span class="chip" onclick="q('00692')">00692</span>
  </div>
  <span class="chip-label" style="margin-left:8px">美股</span>
  <div class="chip-group">
    <span class="chip" onclick="q('SPY')">SPY</span>
    <span class="chip" onclick="q('QQQ')">QQQ</span>
    <span class="chip" onclick="q('VTI')">VTI</span>
  </div>
</div>

<div id="err" class="error-box" style="display:none"></div>

<div id="infoBar" style="display:none"></div>

<div id="main">
  <div class="empty">
    <div class="empty-icon">🔍</div>
    <p>輸入 ETF 代號開始查詢<br>支援台股 ETF（0050、00878…）及美股 ETF（SPY、QQQ…）</p>
  </div>
</div>

</div>

<script>
var COLORS = ['#3b82f6','#34d399','#f59e0b','#f87171','#a78bfa',
              '#38bdf8','#fb923c','#e879f9','#4ade80','#fbbf24','#94a3b8'];
var chartInst = null;
var currentData = null;

function q(sym){ document.getElementById('inp').value = sym; go(); }

async function go(){
  var sym = document.getElementById('inp').value.trim();
  if(!sym) return;
  var btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = '查詢中…';
  document.getElementById('exportBtn').disabled = true;
  document.getElementById('err').style.display = 'none';
  document.getElementById('infoBar').style.display = 'none';
  document.getElementById('main').innerHTML =
    '<div class="loading"><div class="spinner"></div><p style="color:var(--sub);font-size:14px">載入中…</p></div>';
  if(chartInst){ chartInst.destroy(); chartInst = null; }

  try{
    var res = await fetch('/api/etf?symbol=' + encodeURIComponent(sym));
    var json = await res.json();
    if(!res.ok || json.error) throw new Error(json.error || '查詢失敗');
    currentData = json;
    render(json);
  } catch(e){
    var eb = document.getElementById('err');
    eb.textContent = '⚠️ ' + e.message;
    eb.style.display = 'block';
    document.getElementById('main').innerHTML =
      '<div class="empty"><div class="empty-icon">😞</div><p>找不到資料<br>請確認代號正確（台股不需加 .TW）</p></div>';
  }
  btn.disabled = false; btn.textContent = '查詢';
}

function render(d){
  // Info bar
  var ib = document.getElementById('infoBar');
  ib.style.display = 'block';
  ib.innerHTML = '<div class="etf-info">' +
    '<div>' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">' +
        '<span class="etf-sym">' + d.symbol + '</span>' +
        (d.name ? '<span class="etf-name">' + d.name + '</span>' : '') +
      '</div>' +
      (d.category ? '<div style="font-size:12px;color:var(--sub);margin-top:4px">' + d.category + (d.family ? ' · ' + d.family : '') + '</div>' : '') +
    '</div>' +
    '<div class="meta-grid">' +
      (d.expenseRatio ? '<div class="meta-item"><div class="lbl">費用率</div><div class="val">' + d.expenseRatio + '</div></div>' : '') +
      (d.totalAssets ? '<div class="meta-item"><div class="lbl">資產規模</div><div class="val" style="font-size:13px">' + d.totalAssets + '</div></div>' : '') +
      '<div class="meta-item"><div class="lbl">成分股</div><div class="val">' + d.allHoldings.length + ' 檔</div></div>' +
      '<div class="meta-item"><div class="lbl">前10大合計</div><div class="val" style="color:var(--accent2)">' + d.equitySharesTop10.toFixed(2) + '%</div></div>' +
    '</div>' +
  '</div>';

  // Table
  var maxPct = d.top10.length ? d.top10[0].percentage : 1;
  var rows = d.top10.map(function(h, i){
    var rc = i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    var bw = maxPct > 0 ? (h.percentage/maxPct*100).toFixed(1) : 0;
    return '<tr>' +
      '<td><span class="rank ' + rc + '">' + h.rank + '</span></td>' +
      '<td><div class="s-info"><div class="s-code">' + h.symbol + '</div><div class="s-name">' + h.name + '</div></div></td>' +
      '<td><div class="bar-wrap">' +
        '<div class="bar-bg"><div class="bar-fill" style="width:' + bw + '%;background:' + COLORS[i] + '"></div></div>' +
        '<span class="pct">' + h.percentage.toFixed(2) + '%</span>' +
      '</div></td>' +
    '</tr>';
  }).join('');

  if(d.othersCount > 0){
    rows += '<tr class="others-row"><td></td>' +
      '<td>其他 ' + d.othersCount + ' 檔</td>' +
      '<td class="r" style="color:var(--muted)">' + d.othersTotal.toFixed(2) + '%</td></tr>';
  }

  rows += '<tr class="total-row"><td></td>' +
    '<td style="color:var(--sub);font-size:13px">前十大合計</td>' +
    '<td class="r" style="color:var(--accent2);font-size:15px">' + d.equitySharesTop10.toFixed(2) + '%</td></tr>';

  // Legend for chart
  var legHtml = d.top10.slice(0,8).map(function(h,i){
    return '<div class="leg-item"><div class="leg-dot" style="background:' + COLORS[i] + '"></div>' +
      '<span class="leg-name">' + h.symbol + ' ' + h.name + '</span>' +
      '<span class="leg-pct">' + h.percentage.toFixed(2) + '%</span></div>';
  }).join('');

  var posHtml = '';
  if(d.stockPosition || d.bondPosition){
    posHtml = '<div class="position-row">' +
      (d.stockPosition ? '<div class="pos-item"><div class="pl">股票</div><div class="pv" style="color:var(--green)">' + d.stockPosition + '</div></div>' : '') +
      (d.bondPosition  ? '<div class="pos-item"><div class="pl">債券</div><div class="pv" style="color:var(--accent2)">' + d.bondPosition + '</div></div>' : '') +
    '</div>';
  }

  document.getElementById('main').innerHTML =
    '<div class="main-grid">' +
      '<div class="table-card">' +
        '<div class="table-head-row"><h2>前十大持股</h2><span style="font-size:11px;color:var(--muted);font-family:\'IBM Plex Mono\'">TOP ' + Math.min(10, d.top10.length) + '</span></div>' +
        '<table><thead><tr><th style="width:44px">#</th><th>股票</th><th class="r">持股比例</th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table>' +
      '</div>' +
      '<div class="chart-card">' +
        '<h2>持股分布</h2>' +
        '<div class="chart-wrap"><canvas id="pie"></canvas></div>' +
        '<div class="chart-legend">' + legHtml + '</div>' +
        '<div class="total-row-card"><span class="lbl">前十大合計</span><span class="val">' + d.equitySharesTop10.toFixed(2) + '%</span></div>' +
        posHtml +
      '</div>' +
    '</div>';

  // Draw chart
  setTimeout(function(){
    var canvas = document.getElementById('pie'); if(!canvas) return;
    var labels = d.top10.map(function(h){ return h.symbol; });
    var vals   = d.top10.map(function(h){ return h.percentage; });
    if(d.othersTotal > 0){ labels.push('其他'); vals.push(d.othersTotal); }
    chartInst = new Chart(canvas.getContext('2d'),{
      type:'doughnut',
      data:{ labels:labels, datasets:[{
        data:vals, backgroundColor:COLORS.concat(['#334155']),
        borderWidth:2, borderColor:'#111720', hoverOffset:6
      }]},
      options:{
        responsive:true, maintainAspectRatio:true, cutout:'62%',
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:'rgba(13,17,23,.95)', titleColor:'#e2eaf8',
            bodyColor:'#8aaac8', borderColor:'#243044', borderWidth:1, padding:10,
            callbacks:{
              label:function(ctx){ return '  '+ctx.label+': '+ctx.raw.toFixed(2)+'%'; }
            }
          }
        }
      }
    });
  }, 60);

  document.getElementById('exportBtn').disabled = false;
}

function exportExcel(){
  if(!currentData) return;
  var d = currentData;
  var wb = XLSX.utils.book_new();
  var today = new Date().toLocaleDateString('zh-TW');

  function makeWs(rows, cols){
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = cols;
    return ws;
  }

  // Sheet 1 — ETF 基本資訊
  var infoRows = [
    ['ETF 代號', d.symbol],
    ['ETF 名稱', d.name || ''],
    ['分類', d.category || ''],
    ['基金公司', d.family || ''],
    ['資產規模', d.totalAssets || ''],
    ['費用率', d.expenseRatio || ''],
    ['成分股總數', d.allHoldings.length],
    ['前十大合計占比', d.equitySharesTop10.toFixed(4) + '%'],
    ['查詢時間', new Date(d.fetchTime).toLocaleString('zh-TW')],
    ['資料來源', d.source],
  ];
  var ws0 = makeWs(infoRows, [{wch:16},{wch:30}]);
  XLSX.utils.book_append_sheet(wb, ws0, 'ETF 基本資訊');

  // Sheet 2 — 前十大
  var top10rows = [['排名','股票代號','股票名稱','持股比例(%)']];
  d.top10.forEach(function(h){ top10rows.push([h.rank, h.symbol, h.name, h.percentage]); });
  top10rows.push(['','','前十大合計', parseFloat(d.equitySharesTop10.toFixed(4))]);
  if(d.othersCount > 0) top10rows.push(['','其他共'+d.othersCount+'檔','', d.othersTotal]);
  var ws1 = makeWs(top10rows, [{wch:6},{wch:12},{wch:28},{wch:14}]);
  XLSX.utils.book_append_sheet(wb, ws1, d.symbol + ' 前十大');

  // Sheet 3 — 全部成分股
  var allRows = [['排名','股票代號','股票名稱','持股比例(%)']];
  d.allHoldings.forEach(function(h,i){ allRows.push([i+1, h.symbol, h.name, h.percentage]); });
  var ws2 = makeWs(allRows, [{wch:6},{wch:12},{wch:28},{wch:14}]);
  XLSX.utils.book_append_sheet(wb, ws2, d.symbol + ' 全部成分股');

  XLSX.writeFile(wb, 'ETF_' + d.symbol + '_' + today.replace(/\//g,'') + '.xlsx');
}
</script>
</body>
</html>
